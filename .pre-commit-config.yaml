repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^python/
      - id: ruff-format
        files: ^python/

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt
        args: [-w]
        language: system
        files: ^go/.*\.go$
        pass_filenames: true
      - id: go-vet
        name: go vet
        entry: bash -c 'cd go && go vet ./...'
        language: system
        files: ^go/.*\.go$
        pass_filenames: false
